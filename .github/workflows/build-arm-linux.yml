name: Build ARM Linux

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch, tag, or commit SHA to build'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build
        run: cross build --release --target aarch64-unknown-linux-gnu

      - name: Build stealth
        run: cross build --release --target aarch64-unknown-linux-gnu --features stealth
        continue-on-error: true

      - name: Package
        run: |
          cd target/aarch64-unknown-linux-gnu/release
          tar czf ../../../obscura-aarch64-linux.tar.gz obscura
          cd ../../..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: obscura-aarch64-linux
          path: obscura-aarch64-linux.tar.gz
